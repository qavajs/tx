<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Iframe Content</title>
  <style>
    body { padding: 16px; font-family: Arial, sans-serif; }
    button, input { display: block; margin: 8px 0; padding: 6px 10px; }
  </style>
</head>
<body>
  <button id="iframe-btn">Click me</button>
  <input id="iframe-input" type="text" placeholder="Type here" />
  <button id="frameBtn" onclick="document.body.dataset.clicked=true">Frame Button</button>
</body>
</html>

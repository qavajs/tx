<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ARIA Test Page</title>
</head>
<body>
  <h1 id="page-heading">ARIA Test Page</h1>

  <nav id="site-nav" aria-label="Site Navigation">
    <a href="/home">Home</a>
    <a href="/about">About</a>
  </nav>

  <main id="main-content">
    <h2>Form Section</h2>

    <form id="test-form" aria-label="Test Form">
      <label for="name-input">Full Name</label>
      <input type="text" id="name-input" />

      <label for="accept">Accept Terms</label>
      <input type="checkbox" id="accept" />

      <button type="submit" id="submit-btn">Submit</button>
      <button type="button" id="cancel-btn" disabled>Cancel</button>
    </form>

    <ul id="items-list">
      <li><a href="/one">One</a></li>
      <li><a href="/two">Two</a></li>
    </ul>
  </main>

  <!-- display:none — must be absent from snapshot -->
  <div id="hidden-section" style="display:none">
    <button id="hidden-btn">Hidden Button</button>
  </div>

  <!-- role="none" wrapper — children bubble up -->
  <div id="presentation-wrapper" role="none">
    <button id="floating-btn">Floating Button</button>
  </div>

  <!-- aria-hidden — must be absent from snapshot -->
  <section id="aria-hidden-section" aria-hidden="true">
    <button>Should Not Appear</button>
  </section>
</body>
</html>

name: CI

on:
  pull_request:
  workflow_dispatch:  

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests (ci profile)
        run: node dist/index.js --config test/tx.config.js --profile ci --headless

      - name: Parse JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: report/report.xml
          check_name: Test Results (${{ matrix.os }})

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}
          path: report/
          if-no-files-found: ignore
